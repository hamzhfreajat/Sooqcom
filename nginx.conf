server {
    listen       80;
    server_name  localhost;

    location / {
        # Detect social media bots
        set $is_bot 0;
        if ($http_user_agent ~* "facebookexternalhit|WhatsApp|Twitterbot|Slackbot|LinkedInBot|TelegramBot|Pinterest|vkShare") {
            set $is_bot 1;
        }

        if ($is_bot = 1) {
            # Proxy to the backend endpoint that generates the OG HTML
            rewrite ^/(.*)$ /api/v1/og/html?path=/$1 break;
            proxy_pass http://classifieds-backend:8080;
        }

        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
